<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model Embed</title>
    <!-- Load TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>
<body>
    <h1>AI Model Demo</h1>
    <p>Interact with the AI model below:</p>
    <div id="output">Model Loading...</div>

    <script>
        async function loadModel() {
            try {
                const MODEL_URL = 'https://raw.githubusercontent.com/Vishesh-R/Vehicle-Identifier/main/model.json'; // Update this with the actual link
                const model = await tf.loadGraphModel(MODEL_URL);

                document.getElementById('output').innerText = 'Model Loaded Successfully!';

                // Example input and prediction (adjust for your model)
                const input = tf.tensor([1, 2, 3, 4]); // Replace with actual input shape
                const prediction = model.predict(input);
                
                prediction.print(); // Log prediction to console
                document.getElementById('output').innerText = 'Prediction made successfully!';
            } catch (err) {
                console.error('Error loading or running the model:', err);
                document.getElementById('output').innerText = 'Failed to load model.';
            }
        }

        loadModel();
    </script>
</body>
</html>
