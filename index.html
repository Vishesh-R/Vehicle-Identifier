<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model Embed</title>
    <!-- Load TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>
<body>
    <h1>AI Model Demo</h1>
    <p>Interact with the AI model below:</p>
    <div id="output">Model Loading...</div>

    <script>
        async function loadModel() {
            try {
                // Path to the model.json hosted on GitHub
                const MODEL_URL = 'https://raw.githubusercontent.com/Vishesh-R/Vehicle-Identifier/main/model.json';

                // Load the TensorFlow.js model
                const model = await tf.loadGraphModel(MODEL_URL);
                console.log('Model loaded:', model);

                document.getElementById('output').innerText = 'Model Loaded Successfully!';

                // Example prediction (replace with appropriate input for your model)
                const inputTensor = tf.tensor([[1, 224, 224, 3]]); // Adjust shape as needed
                const prediction = model.predict(inputTensor);

                prediction.print(); // Log the prediction
                document.getElementById('output').innerText = 'Prediction made successfully!';

            } catch (err) {
                console.error('Error loading or running the model:', err);
                document.getElementById('output').innerText = 'Failed to load model. Check console for details.';
            }
        }

        loadModel();
    </script>
</body>
</html>
